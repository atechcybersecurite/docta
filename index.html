<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemple boutons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: white;
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
    }

    .gauche {
      flex: 1;
      padding-right: 30px;
    }

    .gauche h2 {
      color: #1F4E79;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .gauche p {
      color: #555;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .boutons {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .btn-primary {
      background-color: #1F4E79;
      color: white;
    }

    .btn-secondary {
      background-color: #2E75B6;
      color: white;
    }

    .btn-danger {
      background-color: #C00000;
      color: white;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .droite img {
      width: 250px;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- GAUCHE : description + boutons -->
    <div class="gauche">
      <h2>Titre de la section</h2>
      <p>
        Ceci est une description placée à gauche de l'image.
        Vous pouvez mettre ici n'importe quel texte pour
        expliquer le contenu de votre page web.
      </p>
      <div class="boutons">
        <button class="btn btn-primary">Bouton 1</button>
        <button class="btn btn-secondary">Bouton 2</button>
        <button class="btn btn-danger">Bouton 3</button>
      </div>
    </div>

    <!-- DROITE : image -->
    <div class="droite">
      <img src="https://via.placeholder.com/250x180" alt="Image exemple">
    </div>

  </div>

</body>
</html>
